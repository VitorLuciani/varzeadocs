<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAN House - Campeonato</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#111;color:#fff}
header{background:#1b1b1b;padding:20px;text-align:center}
.container{max-width:1100px;margin:auto;padding:20px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.card{background:#1b1b1b;border-radius:10px;padding:15px}
.blue{border-left:6px solid #2E86FF}
.red{border-left:6px solid #E53935}
input,select,textarea{width:100%;padding:8px;margin:6px 0;background:#222;color:#fff;border:1px solid #444;border-radius:5px;box-sizing:border-box}
button{background:#2E86FF;color:#fff;border:none;padding:10px 18px;border-radius:6px;cursor:pointer}
.score{display:flex;justify-content:center;align-items:center;font-size:42px;font-weight:bold;margin:20px}
.score input{width:70px;text-align:center;font-size:36px}
.history .item{background:#222;padding:10px;border-radius:6px;margin:8px 0}
</style>
</head>
<body>
<header><h1>🏆 LAN HOUSE - CAMPEONATO</h1><p>Evento: LAN #01 | Mapa: <input style="width:120px;display:inline" value="Mirage"></p></header>
<div class="container">
<div class="grid">
<div class="card blue">
<h2>🟦 Time Azul</h2>
<input placeholder="Capitão">
<input placeholder="Jogador 2"><input placeholder="Jogador 3"><input placeholder="Jogador 4"><input placeholder="Jogador 5"><input placeholder="Jogador 6">
</div>
<div class="card red">
<h2>🟥 Time Vermelho</h2>
<input placeholder="Capitão">
<input placeholder="Jogador 2"><input placeholder="Jogador 3"><input placeholder="Jogador 4"><input placeholder="Jogador 5"><input placeholder="Jogador 6">
</div>
</div>

<div class="card">
<h2>📋 Informações da Partida</h2>
<div class="grid">
<div><label>Modo</label><select><option>MR12</option><option>MR15</option></select></div>
<div><label>Servidor</label><input value="LAN"></div>
<div><label>Data</label><input type="date"></div>
<div><label>Hora</label><input type="time"></div>
</div>
<div class="score">🟦 <input value="13"> x <input value="11"> 🟥</div>
<label>MVP</label>
<select><option>Selecionar jogador</option></select>
<label>Observações</label>
<textarea rows="5" placeholder="Anotações da partida..."></textarea>
<button>Salvar Resultado</button>
</div>

<div class="card history">
<h2>📚 Histórico</h2>
<div class="item">LAN #01 - Mirage - Azul 13 x 11 Vermelho - MVP Ryan</div>
<div class="item">LAN #01 - Inferno - Vermelho 13 x 8 Azul - MVP Magão</div>
</div>
</div>
</body>
</html>
